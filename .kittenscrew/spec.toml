    "cmd: `kittenscrew plan alternatives` ŌåÆ JSON [{id, task, scope, unblocks, blocks}] frontier choices",
    "cmd: `kittenscrew hook <event>` ŌåÆ runs hook logic for ALL 8 CC events SessionStart|UserPromptSubmit|PreToolUse|PostToolUse|Stop|SubagentStop|PreCompact|PostCompact ŌĆö single entry, nothing bypasses (V33); `user-prompt` classifies the prompt (maps-┬¦T|clear|ambiguous) + injects targeted context (plan next + referenced task) as `additionalContext` (V33,V35); `stop` = autonomous driver (default OFF): check-done demote ŌåÆ audit variance ŌåÆ drive-on (block-stop+inject) | emptyŌåÆhalt | flaggedŌåÆescalate, hard-bounded by `[driver] max_iters` (V34,V27)",
    "cmd: `kittenscrew score` ŌåÆ JSON graded conformance: {overall, dims:[{name, pct, detail}]} (interface-completeness, check-done-pass, dep-coverage, value-coverage, sync) ŌĆö convergence metric, ŌŖź binary",
    "cmd: `kittenscrew config show` ŌåÆ resolved `kittenscrew.toml` (defaults if absent) ŌåÆ JSON",
    "cmd: `kittenscrew init` ŌåÆ writes `kittenscrew.toml` template, registers hooks in `~/.claude/settings.json`",
    "cmd: `kittenscrew compression policy` ŌåÆ classŌåÆsqueez-level map as JSON; `compression level <class>` ŌåÆ level for prose|dump|structured|diff (exit 2 if unknown)",
    "file: `kittenscrew.toml` schema ŌåÆ `[kitty] compression_level`, `[hooks] pre, post, session, compact`, `[docs] auto_generate, detail (terse|normal|explain), target (dev|idiot)`, `[plan] strict_ordering, forward_agg (max|sum|hybrid), discount, portfolio_weight, rank_by (worth|roi|expected)`, `[audit] recheck_every_tasks, recheck_every_iters, variance_threshold, on_variance (report|brainstorm|halt)`, `[guard] blocked_cmds=[ŌĆ”]`, `[compression] prose, dump, structured, diff (ŌåÆ off|lite|full|ultra)`, `[driver] autonomous (bool, default false), max_iters (default 8)`, `[gate] enforce_plan (bool, default true) ŌĆö PreToolUse blocks product-code writes until a plan store exists (T57, no planŌåÆno work)`",
