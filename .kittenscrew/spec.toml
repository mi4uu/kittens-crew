schema = 1
goal = """
`kittenscrew` ŌĆö Rust CLI. Wraps squeez hooks (fork: `mi4uu/squeez`) w/ own
hooks. Adds spec/plan management, kitty:says() visual wrapper, per-project
config. Deterministic, fast, agent calls it via commands ŌĆö never writes
SPEC.md directly.
Division of labor: squeez owns compression/dedup/queue/session-memory/
token-tracking ŌåÆ kittenscrew NEVER reimplements those, only wraps. kittenscrew
owns the gap squeez leaves: SPEC/plan/task mgmt, per-project config,
kitty voice, per-task docs. Offload to deterministic Rust what doesn't need
an LLM; leave judgement (intent, prose) to the LLM.
North star: ŌŖź just fewer tokens ŌĆö move work DOWN the model-size ladder w/o quality loss. Offloading deterministic work (plan/validate/diff/scan) to Rust frees a SMALL model's scarce reasoning for genuine judgement ŌåÆ small models become viable. Front-loaded context (the ~50k-on-`hi` bloat) cut via on-demand structured retrieval + caveman + squeez ŌåÆ working room for small models. Safe b/c deterministic gates (spec apply ┬¦V-validate, check done, value-variance, drift) = a hard quality FLOOR that catches a small model's slips. Prove via `benchmarks/agency`: {model tier} ├Ś {kittenscrew on|off} ŌåÆ quality + tokens + $."""
constraints = [
    "Rust Ōēź 1.75, single binary, Ōēż 2MB stripped, 0 runtime deps except `squeez` binary.",
    "AGENT-AGNOSTIC: core = CLI contract (stdin/stdout JSON + exit codes V1) callable by ANY agent (Claude Code, Pi, ŌĆ”) ŌĆö most share the same skills/commands. ŌŖź hardcode any single agent's tooling (no CC `Agent`/`Workflow` baked into core). Hook-layer = the ONLY CC-specific adapter, isolated behind `kittenscrew hook <event>`; other agents wire their own trigger ŌåÆ identical deterministic core. Skills/commands authored portable (FORMAT.md/SKILL.md read by all).",
    "kittenscrew = self-contained cargo workspace (own `[workspace]` in its Cargo.toml) ŌåÆ ŌŖź inherit external workspace root (repo isn't a Rust project).",
    "squeez = binary on PATH (`$HOME/.claude/squeez/bin/squeez` or `which squeez`). Never link library ŌĆö squeez publishes NO crate/lib API, binary only. Fork `mi4uu/squeez` = backup mirror, ŌŖź source of an extracted lib.",
    "squeez config = global INI `~/.claude/squeez/config.ini`. kittenscrew.toml = per-project, additive, ŌŖź overlaps/overrides squeez's INI.",
    "ŌŖź reimplement any squeez feature (compression, dedup, redundancy-queue, session-memory, token-track, nudges). Wrap only.",
    "`.kittenscrew/spec.toml` = SOLE source of truth (structured, deterministic, `schema=1`). SPEC.md = rendered projection for agents/cavekit compat, regenerated on every mutating cmd. `.kittenscrew/*.json` = ephemeral checkpoint only.",
    "`kittenscrew.toml` (per-project config) ŌēĀ `.kittenscrew/spec.toml` (plan store) ŌĆö distinct files, distinct purpose.",
    "Plan = DAG (task = node, dep = edge). Linear order ŌŖź stored ŌĆö derived via topo-sort on demand. Task may have many deps + many dependents ŌåÆ graph, not tree.",
    "SPEC.md format = existing `FORMAT.md` (pipe-table, caveman). Backward compat.",
    '`spec import` ! tolerate real-world variance (FORMAT.md is aspirational, real specs diverge): aligned/code-fenced ┬¦T tables, `desc` vs `task` header, unescaped `|`/`||` in task prose (anchor id+status front, cites back), 3 invariant styles (`Vn:` | `Vn \| ŌĆ”` | `- Vn slug:`), continuation sections (`## ┬¦V ŌĆ” cont.`) accumulate, non-standard `## ┬¦U ŌĆ”` ignored. Validated vs 5 real specs (botm/brainmd/codeHarness/maxijinja/opengraphene).',
    "Per-project config = `kittenscrew.toml` (TOML). Optional. Defaults if absent.",
    "Hooks = bash shims ŌåÆ delegate to `kittenscrew` ŌåÆ delegates to `squeez`. Never bypass squeez for compression.",
    "Wrap ALL 6 squeez hooks: SessionStart, PreToolUse, PostToolUse, SubagentStop, PreCompact, PostCompact.",
    "`claudeoneprovider.sh` / `claudeopenrouter.sh` keep working ŌĆö add `PATH` line only.",
    'skills/commands = MINIMAL routing (frontmatter + 2-3 lines "when to use" ŌåÆ point at `kittenscrew <cmd>`), ŌŖź instruction dumps. how-to lives in the binary (`--help`) + spec (`spec read`, on-demand), ŌŖź front-loaded prose. Goal: help the LLM CHOOSE, ŌŖź pre-load every instruction.',
    """persona voice = PROGRAM output (`kittenscrew kitty says` ŌåÆ emoji+name+role), ŌŖź context decoration. Often omittable ŌĆö the caller usually knows who's acting. A graphical nicety on output, never a context payload. EXCEPTION (T55): a one-line role HINT (which kitty fits the current task, deterministic taskŌåÆrole map) MAY be injected by the intake/driver hooks as orchestration context ŌĆö that's routing ("wear this hat"), not decorative prose.""",
    "old verbose skills/commands/`AGENTS.md`/`CAST.md` = kept under `archive/` as reference template (what we wanted), ŌŖź loaded. Current state ŌēĀ archive; archive is history.",
]
interfaces = [
    "cmd: `kittenscrew --version` ŌåÆ `kittenscrew 0.1.0`",
    "cmd: `kittenscrew kitty says <kitty> <message>` ŌåÆ stdout: `­¤śĮ­¤ōÉ [Planning Kitty] message`",
    "cmd: `kittenscrew kitty list` ŌåÆ stdout: pipe-table of {id, emoji, name, role}",
    "cmd: `kittenscrew spec read [┬¦<S>] [--plain]` ŌåÆ stdout: section/whole; `--plain` expands caveman symbols ŌåÆ English (legend baked in, ŌŖź need FORMAT.md in context)",
    'cmd: `kittenscrew spec apply` ŌåÆ stdin = STRUCTURED JSON diff `{section:"┬¦T", op:"add|edit|kill|done", payload:{ŌĆ”}}` ŌåÆ exits 0 + updated SPEC.md, exits 2 + message on ┬¦V violation. ŌŖź parses freeform prose intent ŌĆö caller (LLM) supplies structure; kittenscrew only validates+writes+orders.',
    "cmd: `kittenscrew docs task <id>` ŌåÆ write `docs/<id>-<slug>.md` describing what+why for done task. OFF by default (`[docs] auto_generate=false`). Detail level from `[docs] detail` (terse|normal|explain).",
    "cmd: `kittenscrew spec check` ŌåÆ stdout: list of {id, status, cites} for ┬¦V",
    "cmd: `kittenscrew plan resolve` ŌåÆ stdout: JSON `{tasks:[{id,deps,order}], roots:[ŌĆ”]}` (topo-sort of DAG)",
    "cmd: `kittenscrew plan ready` ŌåÆ stdout: JSON `[ŌĆ”]` ALL unblocked `.` tasks (deps all `x`), sorted by priority ŌåÆ the parallelizable batch",
    "cmd: `kittenscrew plan next` ŌåÆ stdout: single next ┬¦T.id (ready, lowest priority then id)",
    "cmd: `kittenscrew plan blocking <id>` ŌåÆ stdout: tasks blocked by `<id>` (reverse-dep query)",
    "cmd: `kittenscrew check done` ŌåÆ stdout: per `x` task {id, ok|fail, markers, broken_cites}; demotes failed `x`ŌåÆ`~` (V18,V19)",
    "cmd: `kittenscrew check variance` ŌåÆ stdout: per eval'd done task {id, expected, delivered, variance, direction, flagged}; `[audit] on_variance=halt` ŌåÆ exit 2 (V25)",
    "cmd: `kittenscrew spec render` ŌåÆ regenerate SPEC.md from `.kittenscrew/spec.toml`",
    "cmd: `kittenscrew spec import` ŌåÆ parse SPEC.md ŌåÆ `.kittenscrew/spec.toml` (bootstrap / re-sync after manual edit)",
    "cmd: `kittenscrew spec drift [--apply]` ŌåÆ diff edited SPEC.md vs store projection ŌåÆ report {task_added,removed,changed, prose_changed}; `--apply` reconciles structural + carries toml-only fields + re-renders (V16)",
    "cmd: `kittenscrew plan graph` ŌåÆ ASCII DAG render of tasks+deps (someday/optional, presentation-only)",
    "file: `.kittenscrew/spec.toml` ŌåÆ authoritative structured store (`schema=1`): `[goal]`,`[constraints]`,`[[interface]]`,`[[invariant]]`,`[[task]]` (id,status,deps,priority,cites,scope,note),`[[bug]]`",
    "cmd: `kittenscrew plan done <id>` ŌåÆ flips status ŌåÆ Done in store, re-renders SPEC.md projection",
    "cmd: `kittenscrew plan impact <id>` ŌåÆ JSON {scope, unblocks[], blocks[]}",
