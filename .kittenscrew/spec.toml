priority = 2
cites = ["§I"]
scope = ["kittenscrew/src/driver/events.rs"]
note = "Settled this session. INTEGRITY GUARD (sharpest, CATEGORICAL): a verify result is authoritative only if its artifact (test/§V/check) was UNCHANGED by the change it gates — detect via diff ∩ verify-artifacts, prevent via capability (verify is OUTSIDE executor write-scope), provenance (check modified by the task it gates = circular = invalid). criterion_tampering NEVER passes silently + mandatory explanation + owner judgment — categorical, NOT severity-scaled (contrast missing_verify which IS scaled by task scale/consequence). Sovereign principle: orchestrator supreme, agents only REQUEST, accept governed by rules (spec apply = the gate). done(verified) vs 'done'(asserted) is a real state bit. owner = user|check|agent, recursive on spawn-tree (escalation climbs: local owner first, user=root last; deadline+fallback bc protein-interface has highest lag). Maps onto T76 OrchScore + the per-task progress hook already in the drive loop. Memories: measure-orchestration-not-code-quality, tui-report-surfacing-fzf-preview, model-preferences-not-bans. OPEN edges (surface in build, not theorized now): flaky-check runtime policy, event-mid-node preemption, global deadlock (all-waiting-on-offline-owner), semantic-drift ('world moved' — a correctly-done node invalidates a not-yet-started node's assumptions, softer than a hard green->red regression)."
