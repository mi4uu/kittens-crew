[[bug]]
id = "B1"
date = "2026-06-08"
cause = "deploy copied only the server binary; runtime tree (templates/static/strats) loaded from WorkingDirectory via minijinja path_loader was never synced → prod/demo served Mar-23 templates, hiding GEM, realized columns, ratings, universe editor"
fix = "bin/deploy_native.sh always rsyncs templates/static/public/strats into ~/Services/botmarley before restart; V-note: a deploy is incomplete unless the runtime tree is synced, not just the binary"

[[bug]]
id = "B2"
date = "2026-06-11"
cause = "live/paper sessions never traded (candles_processed=0 for ~19h): the engine waits on the DataIngestionService broadcast for its pair, but the pair was never registered for ingestion. `merge_active_sessions` (meant to register active-session pairs at boot) ALWAYS errored — it queried `config->>'pair'` (no such column; flat `pair` column) WHERE `status IN ('Running','Paused')` (status stored lower-case 'running'). Error swallowed (warn) → registry only had seeded BTC/ETH → engine starved on a different pair (ADA/USDC). Also no runtime registration: a session started after the service was live could never be fed."
fix = "(1) fixed query → `SELECT DISTINCT pair FROM trading_sessions WHERE lower(status) IN ('running','paused')`. (2) DataIngestionService.registry now RwLock + `ensure_pair()`; task_executor calls it on session start so candles flow within one tick, no restart. V-note: starting a session MUST register its pair for live ingestion (boot-merge for recovered sessions + runtime ensure_pair for new ones)"

[[bug]]
id = "B5"
date = "2026-06-15"
cause = """SILENT no-op #2 (same session): paper sessions on `_USDC` / `_BNB` pairs (the whole All-Weather basket + drift ratios like XRP/BNB) routed live candle fetching to KRAKEN via `CandleFetcher::is_binance_pair`, which only inspected the BASE asset against a hardcoded list and ignored the QUOTE. Kraken has no USDC/BNB markets → self-fetch returned nothing → no live candle ever arrived → main loop never ran → candles_processed=0, UI "waiting for indicator data" forever. Note: the ingestion service WAS pulling XRP/USDC from Binance; only the engine's own fetcher was mis-routed."""
fix = "`is_binance_pair` now routes by quote first: quote ∈ {USDC, BNB} ⇒ Binance (Kraken quotes USD/USDT/EUR/XBT), then the existing base-asset list. V-note: paper exchange routing must consider the quote, not just the base; a session that can't source candles must surface, not idle silently."

[[bug]]
id = "B6"
date = "2026-06-16"
cause = 'SILENT no-op (recurrence of B4 class): live/paper session `0393016a` (LINK_USDT, Avalanche, BB(30)@4h needs ~7440 1m candles) stuck on "waiting for indicator data" — `Failed to build indicator cache ... Bollinger Bands: need 30, have 6` every ~60s. TWO causes: (1) the re-bootstrap guard was `if buffer.len() < MIN_CANDLE_BUFFER` (500); a high-TF strat loads a buffer that clears 500 yet is far below its warm-up need (7440) → bootstrap skipped → BB/RSI never compute. (2) the RECOVERY spawn path never `ensure_pair(own_pair)` for ingestion (only the entry-filter ref), so a recovered session could fall to self-fetch and stall on a thin buffer.'
fix = "(1) guard now `buffer.len() < strategy.warmup_1m_candles().clamp(MIN, MAX)` → bootstraps until the buffer can actually warm the indicators (or hits the cap). (2) recovery now `ensure_pair(&pair)` like task_executor. Verified live: 0393016a bootstrapped a 30-day buffer, 0 indicator failures after. V-note: the live bootstrap/re-bootstrap threshold MUST be the strategy's warm-up need, not a flat floor; every recovered session MUST register its own pair for ingestion."

[[bug]]
id = "B4"
date = "2026-06-15"
cause = 'SILENT no-op: a live/paper session on a high-timeframe long-lookback strategy (All-Weather = EMA-200 @4h, needs ~33 days warm-up) on a pair WITHOUT local Arrow history showed status "running" but candles_processed=0 forever — "waiting for indicator data". Cause: the bootstrap fetched a FIXED 30-day window with intervals capped at 1h, strategy-agnostic, so EMA-200@4h (needs >30 days of 4h bars) never had enough data. `exceeds_buffer_limit` even detected it but only WARNED. Worst kind of bug: pretends to work.'
fix = "Bootstrap depth now DERIVED from `strategy.warmup_1m_candles()` (+50% margin, floor 30d); fetch a resolution ladder (1d/4h/1h/15m/5m/1m up to the strategy's `coarsest_timeframe_minutes()`, never coarser — aggregation can't split a coarse candle), each interval pulled from its own recent window so all reach now. V-note: live bootstrap MUST cover the strategy's actual indicator warm-up span, not a fixed window; a strategy that can't warm up must be surfaced, never silently idle. Refactored the 3 duplicated warm-up loops into `warmup_1m_candles()`."

[[bug]]
id = "B3"
date = "2026-06-15"
cause = """backtests of any shorting strategy (e.g. drift_ratio_meanrev) failed with a swallowed "db error". The §U6 short side added the `open_short` action type but the `backtest_actions.valid_action_type` CHECK still only allowed ('open_long','buy','sell'), so inserting an open_short action violated the constraint. Hidden because `format!("{}", tokio_postgres::Error)` prints just "db error" and drops the DbError source detail."""
fix = "Widened the CHECK to include 'open_short' (schema.sql + idempotent DROP/ADD migration in create_schema for existing DBs); surfaced the PG error via `.source()` in the insert map_err. V-note: any new ActionType variant that can be persisted MUST be added to every action_type CHECK constraint (backtest_actions today). Verified: drift_ratio_meanrev XRP_BNB backtest now completes."
