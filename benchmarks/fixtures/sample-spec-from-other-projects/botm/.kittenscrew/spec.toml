[[invariant]]
id = "V23"
text = "metrics honest → ⊥ result < -100% for spot long-only; grade on REALISED (⊥ mark-to-market paper); benchmark pays same fees; displayed equity = engine's actual equity. ⊥ clairvoyant/paper metric shown as real."

[[invariant]]
id = "V24"
text = "trigger threshold may be ATR-scaled → value `±k*atr[_period]` (sign=direction, period default 14, tf from trigger's timeframe). resolved ONCE at position entry: threshold% = k · ATR(closed bars ≤ entry tick) / entry_price · 100, then FROZEN for position life (⊥ recompute per tick → stable target). warmup (< period closed bars) → trigger inert (⊥ fire). reference point unchanged (pos_price_change from entry/avg, follow from peak/trough; ATR sets magnitude only). obeys V21 (⊥ look-ahead) + V22 (backtest ≡ live). fixed `%` triggers unchanged (full back-compat). edge claim valid only if ONE shared multiplier holds positive out-of-sample across ≥4 pairs (walk-forward) — else ATR = relocated overfit, reject. OPT-IN `_live` token (e.g. `-3*atr_1h_live`) → recompute ATR at CURRENT tick even on a position trigger (DCA/TP adapt to current pace) instead of entry-freeze; default = frozen."

[[invariant]]
id = "V25"
text = "portfolio multi-pair mode (shared pool) — opt-in (≠ isolated equal-weight run_multipair, which stays). ONE shared cash + ONE positions list, each position pair-tagged. all universe pairs evaluated on a unified 1m timeline; a pair is evaluated only on ticks where it HAS a candle (own IndicatorCache, no look-ahead V21). opens draw from the SHARED cash, sized by the action's `amount` exactly as single-pair (`20 USDC` or `% of shared cash`). `max_open_positions` caps TOTAL open positions across ALL pairs; optional `max_per_pair` caps per pair. contention = first-come: at a tick, pairs processed in universe order; the first to claim the last free slot/cash wins → deterministic (V22). DCA/sell/follow triggers act ONLY on that pair's own positions; fills at that pair's next open. obeys V21 + V22 + V10. universe of 1 ≡ single-pair engine (parity)."

[[invariant]]
id = "V27"
text = "multi-pair backtest metrics honest (V23 for universe runs) — a multi-pair run (`pair` = `A+B+C…`) MUST show a Buy&Hold benchmark + Max Drawdown + CAGR/Sharpe, not n/a / 0.00. B&H = EQUAL-WEIGHT hold of the universe: split initial capital 1/N across the N pairs at the window's first close, pay the same per-fill fee as the strategy, mark each pair at its own close, net a round-trip fee (fair alpha, V23). Equity curve reconstructed HONESTLY over a daily timeline from the stored actions: per-pair crypto = Σ signed `amount_crypto` (open/buy +, sell −) of that pair up to t; shared usd = latest action's `usd_balance` ≤ t; equity(t) = usd + Σ_pair crypto_pair·close_pair(t) (each pair at ITS OWN price — never one pair's price applied to all). terminal equity anchored to the engine's `final_balance_usd` (T54). MDD/CAGR/alpha/grade then come from this curve via `metrics::compute`. Retroactive: computed at render from stored actions + reloaded candles, no migration, works on existing runs. Single-pair path unchanged."

[[invariant]]
id = "V26"
text = """preemptive eviction (shared-pool only, opt-in via `[eviction]`) — capital-velocity policy: a fresh open blocked ONLY by the GLOBAL `max_open_positions` may evict an existing open position to free its slot, so fast-cycling pairs aren't starved by long-held bags. Trigger point = a would-open (open_long triggers fire) rejected by the global cap; that blocked open IS the contention signal (no new TOML trigger). Eligibility: a victim must be held ≥ `min_hold` (duration). Victim choice = `policy`: `smallest_loss` (max mark-to-market P&L, min booked loss — WARN: keeps deep bags), `oldest` (min opened_at_tick), `worst_laggard` (most-underwater per day held = min unrealised%/hold_days). Victim may be ANY pair (shared pool); forced full-close fills at the VICTIM pair's next open with the same fee/rounding as a normal sell (V22), books REALISED P&L, emits a pair-tagged sell action (status_reason "evicted: slot contention"). Per-pair cap (`max_per_pair`) is NEVER preempted (eviction frees a global slot only; if the contender is at its own per-pair cap, no eviction). Default OFF → existing shared-pool behaviour unchanged. universe=1 has no contention → single-pair path byte-identical (parity V10/V22 holds). cash conserved (no money created); global cap still never exceeded post-eviction."""

[[invariant]]
id = "V28"
text = "short-side OPTIONAL + opt-in per strat via `open_short` action. strat w/o any open_short ≡ pre-short engine byte-identical (parity V10). ⊥ global flag, ⊥ every strat shorts. long-only TOML unchanged (no `side` token)."

[[invariant]]
id = "V29"
text = "NO LEVERAGE. gross exposure = Σ long cost-basis + Σ |short notional@entry| ! ≤ total_equity at open → else reject open (mirror existing `amount_usd > usd_balance` guard). short open notional X@P → usd_balance += X, crypto_balance −= X/P (negative bal = owed crypto). total_equity = usd + Σ crypto·price (negative crypto = liability) ∴ short P&L correct w/o new equity math. cash conserved (⊥ money created)."

[[invariant]]
id = "V30"
text = "short exits DIRECTION-AWARE. for Short position: pos_price_change = (entry − price)/entry (positive when price FALLS = profit); trailing_stop trails the TROUGH (low since entry), fires when price rises k off trough; hard stop fires when price RISES vs entry; time_in_position unchanged; follow inverts peak/trough. close = buy-to-cover (full|%). Long positions ⊥ changed (byte-identical, V10)."

[[invariant]]
id = "V31"
text = "⊥ SILENT LIVE SHORT. real exchange short needs margin/borrow (no leverage = cash-secured, still margin acct). until live short impl'd → strat w/ open_short runs backtest + paper ONLY; live attempt → refuse | paper-fallback + surfaced notice (like Kraken paper fallback). ⊥ silently place a spot order that cannot actually short."

[[invariant]]
id = "V32"
text = "CROSS-ASSET ENTRY FILTER (optional, opt-in per strat via `[entry_filter]`). a strat WITHOUT the block ≡ pre-filter engine byte-identical (parity V10, gate = None). filter gates ONLY opens (`open_long`/`open_short`); DCA (`buy`)/`sell`/cover/follow/trailing/stop NEVER gated — once in a position, exits run unconditionally (don't trap capital behind a closed gate). gate from a REFERENCE pair's moving-average momentum: ma_type ∈ {ema (primary), hma}, span N, on the ref pair's `timeframe` (default 1m). condition ∈ {rising: MA(t)>MA(t−1) | velocity: MA(t)/MA(t−1)−1 ≥ threshold | price_above: ref_close(t)>MA(t)}. ⊥ LOOK-AHEAD (V21): gate at timeline tick t uses ONLY the ref bar fully CLOSED ≤ t (close_time = open_ts + tf_dur ≤ t) → ref MA aligned to timeline by TIMESTAMP (binary search), never by index (ref pair ≠ current pair, different 1m arrays/gaps). warmup (< span closed ref bars at t) → gate CLOSED (trend unconfirmed ⇒ no open); bounded by span only. BACKTEST = PAPER = LIVE (V10): same ref candles + MA + alignment ⇒ same gate. ref data MISSING (backtest: no ref Arrow; live: ingestion never broadcast ref) → SURFACE the error, ⊥ silently skip the gate (would over-trade) NOR silently idle. ref pair = current pair allowed (self-momentum filter)."

[[invariant]]
id = "V33"
text = "ARROW 1m FILES SELF-HEALING + CONTIGUOUS (P0). backtest, paper bootstrap and live ALL read the SAME `{pair}/1m.arrow` → it MUST be gap-free, or the three modes silently diverge (V10) and indicators compute on holey data. An INTEGRITY GUARD scans every Arrow pair on disk for INTERNAL gaps (any interval > 2×1m → one missing candle tolerated, matches GapFiller), refetches the missing range (Binance primary, Kraken fallback) and MERGES it back to the Arrow file. Runs (a) at server startup (after a delay), (b) on a schedule, (c) after a history sync of a pair (so freshly-synced data is contiguous before any backtest reads it). TRAILING gap (last candle → now) is NOT a hole (just not-yet-fetched) → excluded from the contiguity verdict. A gap the exchange genuinely lacks (delist/downtime) is REPORTED (logged), not silently masked nor infinitely retried. ⊥ look-ahead: healing only inserts real historical candles at their true timestamps. The guard is idempotent — a clean file is a no-op."

