[[bug]]
id = "B2"
date = "2026-05-29"
cause = "bitshares-bindings stale ≠ swaplock-bindings @ identical C++ headers. transfer_op.extensions: bitshares `FutureExtensions` (variant); swaplock `Vec<FutureExtensions>` (flat_set). empty encode 0x00 either way; non-empty divergent."
fix = "V18,V19"

[[bug]]
id = "B3"
date = "2026-05-29"
cause = "`Transaction::signature_preimage_bytes` @ `graphene-chain-swaplock-bindings/src/generated/fc.rs:4834` hardcodes `decode_chain_id_hex(crate::generated::ids::CHAIN_ID_HEX)` — uses CODEGEN-TIME constant, not runtime chain_id from session/builder. Rust signer + real witness can ⊥ disagree on chain_id without losing all sig-verify. multi-chain SDK (T31 acta/rsquared) can ⊥ share the binary. fix workaround: align mock-rpc/witness chain_id w bindings' baked CHAIN_ID_HEX. real fix: T64 — refactor `signature_preimage_bytes(chain_id: &[u8; 32])` taking runtime arg, threading from session. uncovered: T62a smoke (Rust signed over swaplock-mainnet chain_id, mock-rpc had `decade01…`, recovery → random pubkey)."
fix = "V28,T64"

[[bug]]
id = "B4"
date = "2026-05-29"
cause = "mock-rpc verify.ts used `ops.signed_transaction.toBuffer(unsignedTx)` to reconstruct signing preimage — bitsharesjs `signed_transaction` serializer appends `varint(signatures.length)` even when empty (= 1 byte `00`). graphene-fc's preimage == Transaction body only (no signatures field). 1-byte trailing mismatch → digest different → `Signature.recoverPublicKey` returned random pubkey instead of signer's. fix: switch to `ops.transaction.toBuffer({ref_block_num, ref_block_prefix, expiration, operations, extensions})` — Transaction body only. uncovered: T62a byte-by-byte preimage hex dump showed exactly 1 trailing `00` extra w mock-rpc."
fix = "V25,V13"

[[bug]]
id = "B5"
date = "2026-05-29"
cause = 'bitsharesjs 6.0.3 default `ChainConfig.address_prefix = "CBA"` (Cybex sister chain). public_key Serializer cicho odrzuca BTS-prefixed keys (`Expecting key to begin with CBA, instead got BTS`). every consumer (backend signer, frontend WIF gen, mock-rpc verify) ! load `bitsharesjs-ws/lib/ChainConfig` + `ChainConfig.setPrefix("BTS")` BEFORE any FC encode/decode involving public_key fields. uncovered: T63 admin tab `account_create` first run.'
fix = "V26"

