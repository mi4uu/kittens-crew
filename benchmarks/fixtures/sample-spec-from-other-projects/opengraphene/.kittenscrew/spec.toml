schema = 1
goal = "Port Graphene Toolkit (C++) → idiomatic Rust w wire-compatible bindings ∀ chain (swaplock first, then bitshares/acta/rsquared). Parity ! verified via tests vs C++ refs."
constraints = [
    "lang: Rust edition 2024, workspace `Cargo.toml` @ repo root.",
    "license: MIT OR Apache-2.0.",
    "generated code ∈ `*-bindings/src/generated/*.rs`, marker `Do not edit by hand.`, regen-only.",
    "FC wire format ! byte-identical to C++ `fc::raw::pack`.",
    "transaction signature digest ! `sha256(chain_id || transaction_fc_bytes)` (see `SIGNATURE-FORMAT.md`).",
    "transport: blocking `tungstenite` 0.24 (sync). No async runtime in core crates. `tokio` only in examples.",
    "crypto: `secp256k1` 0.29 (recovery), `ripemd` 0.1, `sha2` 0.10, `bs58` 0.5. ⊥ vendor C++ libsecp.",
    "C++ source read-only via `mirror.toml`: `blockchains/swaplock/swaplock-core` (readonly), `blockchains/bitshares/bitshares-core` (readonly), R-Squared, acta-network.",
    "standalone C++ ref clone: `../bitshares-core` (submodules incl `libraries/fc`).",
    "spec pipeline: C++ → tree-sitter-cpp parse → v3 IR (`open-graphene-json-schema`) → Rust emit.",
    "FC fail-closed: ⊥ silent fake bytes for unsupported types — error instead. ref `FC-SUPPORT.md`.",
    "generated bindings crates ⊥ import high-level SDK ops. raw protocol + wire only.",
    "`graphene-transport` chain-generic. ⊥ import generated chain bindings.",
    "`graphene-sdk-core` pure: ⊥ RPC, ⊥ signing, ⊥ broadcast, ⊥ generated, ⊥ chain-specific tx construction.",
    "signing / broadcast / fee / confirm policy explicit @ call sites.",
    "swaplock chain_id = `2267f694d96b7ffdcba1a98c63c09e720a18a85ad34954e299c66d5a42234098`, pubkey prefix `BTS`.",
    'priority: swaplock (fork 1:1 bitshares) PRIMARY. rsquared + acta deferred → "later in SDK" (upstream).',
    'Upstream flagged `graphene-sdk-live` + `graphene-sdk-operations` jako "do wyjebania" (3 tygodnie spalone na próbie unifikacji 4-chain interface). REMOVAL ⊥ auto — review po Dart + TS implementation gdy będzie 5+ chains.',
    "feature-branch policy: high-risk experimental refactors @ `feat/<name>` branch. ⊥ merge do main bez proven ROI + accepted by maintainer.",
]
interfaces = [
    "bin: `open-graphene-spec-gen` (clap) — reads `<chain>/open-graphene.toml`, writes `dist/<chain>.open-graphene.json`.",
    "bin: `open-graphene-gen-bindings-rs` (clap) — reads v3 IR JSON, emits `graphene-chain-<x>-bindings/src/generated/{fc,ids,types,operations,static_variants}.rs`.",
    "lib: crate `graphene` (facade) — top re-exports + 20 runnable examples in `graphene/examples/swaplock/*.rs`.",
    "lib: crate `graphene-transport` — `GrapheneSession::connect(url)`, `database_call/history_call/network_broadcast_call`, raw fns `get_objects`, `get_account_balances`, `get_account_history`, `broadcast_transaction`.",
    "lib: crate `graphene-chain-swaplock-api` — typed sessions: `DatabaseApi`, `HistoryApi`, `OperationsApi`, `NetworkBroadcastApi`. const `SWAPLOCK_CHAIN_ID`.",
    "lib: crate `graphene-chain-swaplock` — `SwaplockSession` + scenario helpers.",
    "lib: crate `graphene-fc` — `pack/unpack`, sha256, ripemd160, secp256k1 sign/recover, WIF.",
    "shell: `open-graphene-packages/rust/graphene-chain-swaplock/bin/trading-scenario.sh` — e2e against testnet.",
    "env: `SWAPLOCK_RPC_URL`, `SWAPLOCK_ACTIVE_WIF`, `SWAPLOCK_ACCOUNT`. opt: `SWAPLOCK_SCENARIO_*`.",
    "spec config: `<chain>/open-graphene.toml` — `[chain]`, `[source]`, `[output]`, `[[rpc_apis]]`.",
    "IR: v3 JSON Schema via `schemars` from `open_graphene_json_schema::Protocol`.",
    "chain `acta` = fork R-Squared + dodatkowe operacje content_card + data_rooms (extension SDK scope; deferred po swaplock).",
    "demo web app: Bun + Hono backend + React 19 + Radix UI Themes + Tailwind frontend @ `open-graphene-packages/demos/web/`. ⊥ default-shadcn-grid look; design tokens + intentional hover/focus/active states + mobile-responsive. 4+ screens: account dashboard, balance, send transfer (signed via vault-stored WIF), tx history. consumes T50 bindings + T51 hooks. dev `bun dev` + prod `bun start`.",
    "demo mobile app: Flutter @ `open-graphene-packages/demos/mobile/`. runs in iOS Simulator (preferred — faster boot on Mac) + Android Emulator. consumes T49 Dart bindings. screens parity w T54 web demo: account, balance, send, history. real mobile UX — Material 3 + Cupertino adaptive, bottom nav, pull-to-refresh, biometric/local-auth WIF unlock. boot scripts: `make demo-mobile-ios` + `make demo-mobile-android`.",
    "demo stack: `docker-compose.yml` @ repo root spinujący cały ekosystem (swaplock testnet node + Bun/Hono backend + React frontend + opcjonalny dashboard). single `docker compose up` runs everything; mobile app is separate (emulator-only, no Docker).",
    'web demo admin tab @ `/admin` route. raw access do całego protocol surface bez wrapperów: każda operacja jako oddzielny form. ⊥ password gate (demo, jawnie banner). 7 operacji w MVP scope: (1) account_create — generuj fresh WIF + pubkey w przeglądarce, pokaż "save this", broadcast jako atlas, (2) asset_create — nowy custom token (symbol/precision/max_supply), (3) asset_issue — wypłać X swojego tokena dowolnemu accountowi, (4) account_update — zmień active key (potrzebuje WIF własnego), (5) limit_order_create — sell A buy B, (6) limit_order_cancel — cancel po id, (7) proposal_create — propose any operation z time-locked approval. każdy form: zaznaczone defaults, "preview signed tx hex" przed broadcast, post-broadcast receipt z tx_id + block_num + link do /history odbiorcy.',
    'WIF helper widget @ admin tab footer: generuj nowy secp256k1 key, wyświetl WIF + BTS-prefix pubkey + "copy" button. ⊥ persystencja — w pamięci tylko; user kopiuje jeśli chce.',
]

[[invariant]]
id = "V1"
text = "∀ generated file ! header `Generated by open-graphene-gen-bindings-rs.` + `Do not edit by hand.`"

[[invariant]]
id = "V2"
text = "∀ FC encode of unsupported shape → explicit error, ⊥ plausible-but-wrong bytes."

[[invariant]]
id = "V3"
text = "∀ string-shaped protocol value ! treat as FC string ⇔ spec type == `string`."

[[invariant]]
id = "V4"
text = "`flat_set`/`flat_map` input ! already sorted & unique. ⊥ silent canonicalize. unsorted → error."

[[invariant]]
id = "V5"
text = "nested operation serialization fallible. err ! propagate to caller."

[[invariant]]
id = "V6"
text = "signature digest == `sha256(chain_id_bytes || transaction_fc_bytes)`. compact sig == exact 65 bytes."

[[invariant]]
id = "V7"
text = "`signed_transaction` FC == transaction_fields || `array(bytes(65))` signatures."

[[invariant]]
id = "V8"
text = "`time_point_sec` encode == little-endian `u32` Unix seconds."

[[invariant]]
id = "V9"
text = "operation static variants encode == `varint(tag) || operation_payload`. tag order == C++ typelist."

[[invariant]]
id = "V10"
text = "ObjectId parse ! match `space.type.instance` with generated expected `(space,type)` per ID newtype."

[[invariant]]
id = "V11"
text = "chain bindings crate ⊥ depend on `graphene-transport` or `graphene-sdk-live` (raw types only)."

[[invariant]]
id = "V12"
text = "`graphene-sdk-core` ⊥ depend on generated bindings or chain crates."

[[invariant]]
id = "V13"
text = "∀ per-chain wire test ! verified byte-equal vs C++ ref (canonical fixture from `bitshares-core` or `swaplock-core`)."

[[invariant]]
id = "V14"
text = "∀ ObjectId `(space,type)` mismatch on construction → error before send to wire."

[[invariant]]
id = "V15"
text = "`WebSocketTransport` buffered-notice queue preserves order of arrival."

[[invariant]]
id = "V16"
text = "example file path == declared `[[example]] path` in `graphene/Cargo.toml`."

[[invariant]]
id = "V17"
text = "∀ extractor C++ type lookup key ! fully-qualified namespace path. ⊥ collision ∀ shared unqualified name."

[[invariant]]
id = "V18"
text = "∀ chain bindings crate ! up-to-date w current gen-bindings-rs schema. ⊥ ship stale `src/generated/`."

[[invariant]]
id = "V19"
text = "CI gate ! `cargo run -p open-graphene-gen-bindings-rs` ∀ chain & `git diff --quiet src/generated/`. diff → CI fail."

[[invariant]]
id = "V20"
text = "∀ CI job ! run inside reproducible container image (single manifest). host-installed tooling ⊥ allowed as primary path. dev `make ci` ≡ CI run."

[[invariant]]
id = "V21"
text = "∀ demo app ! consume only generated bindings + `graphene-fc` public API. ⊥ duplicate wire format / FC encoding / signing logic in demo code. if demo needs custom wire helper → upstream into bindings layer instead. demo's job == prove bindings work, ⊥ reimplement them."

[[invariant]]
id = "V22"
text = "∀ demo app ! pass quality checklist before `x` flip — (a) ⊥ Lorem Ipsum / placeholder copy, (b) >=4 distinct screens or views, (c) error states designed (⊥ raw RPC error string dump), (d) loading skeletons ⊥ generic spinners, (e) zero-config first run via hardcoded testnet `try it` account. CI publishes screenshot artifacts ∀ main screen."

[[invariant]]
id = "V23"
text = 'admin tab w web demo == raw protocol surface, ⊥ business-logic wrappery (np. "send transfer" w admin tab to nadal generuje plain TransferOperation, ⊥ skrót przez SDK helper). cel: user widzi 1:1 mapowanie UI form ↔ swaplock operation, tak by mógł zweryfikować że bindingi pokrywają cały protokół.'

[[invariant]]
id = "V24"
text = "admin actions ! observable post-fact via `/history` endpoint. ∀ op applied @ mock-rpc → history record na każdym affected account (issuer, recipient, market participants, proposed-as account). admin tab post-broadcast receipt linkuje do `/history/<account>` strony żeby user kliknął i zobaczył mutację bez konieczności manualnego odświeżania."

[[invariant]]
id = "V25"
text = "∀ transaction signature preimage == `chain_id_bytes(32) || fc_serialize(Transaction)`. Transaction body only — ⊥ signatures field, ⊥ varint(signatures.length), ⊥ trailing extras. mock-rpc + ∀ cross-impl verifier ! reconstruct over same shape (`ops.transaction.toBuffer`, NOT `ops.signed_transaction.toBuffer`). sigs są append'owane PO sign, nigdy ⊥ part of preimage."

[[invariant]]
id = "V26"
text = '∀ bitsharesjs consumer (backend, mock-rpc, frontend) ! call `ChainConfig.setPrefix(chain.prefix)` przy module load. default w bitsharesjs 6.x == "CBA" (Cybex). public_key serialiser cicho odrzuca BTS-prefixed keys gdy prefix mismatched. catch this on every fresh dep upgrade.'

[[invariant]]
id = "V27"
text = "∀ mock-rpc (and ∀ test double speaking BitShares JSON-RPC) ! satisfy real-witness-faithful surface — (a) `call(1, name)` login_api routing dispatches to handshake methods, (b) timestamp strings drop sub-second + `Z` suffix (canonical BitShares format), (c) get_accounts accepts names alongside ids, (d) Account / Asset / DynamicGlobalProperty objects ! emit every field the strict Rust serde deserializer requires (lifetime_referrer, num_committee_voted, cashback_vb, allowed_assets, creation_block_num, max_market_fee, core_exchange_rate, last_vote_tally_time, total_pob, total_inactive, …). niespełnienie = Rust transport handshake fails OR strict deserialize fails. → real witness path (T62) gets this free; mock paths ! match."

[[invariant]]
id = "V28"
text = "∀ Transaction signing ! resolve chain_id from RUNTIME session context, NOT codegen-time constant. current bindings hardcode `crate::generated::ids::CHAIN_ID_HEX` w `Transaction::signature_preimage_bytes` (B3); same Rust binary CAN'T sign txs for >1 chain (T31 acta + rsquared blocked from sharing the binary). T64 refactors this; until T64 lands, mock-rpc + real witness must identify as the chain_id the bindings were generated against."

