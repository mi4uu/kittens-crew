schema = 1
goal = "Rust crate. Build styled + interactive UI components (radix/shadcn/coreui-like) for axum apps using minijinja + htmx. React-like ergonomics, zero external JS/CSS build step. SSE supported. Ship component lib + live interactive showcase."
constraints = [
    "C1 lang Rust. server axum (primary target).",
    "C2 templating minijinja. fragment render = first-class.",
    "C3 htmx = primary interaction model.",
    "C4 alpine.js (or equal-simple) = sprinkle interactivity when htmx not enough.",
    "C5 NO external build tooling. no node/npm/vite/webpack/tailwind-CLI to use lib or render.",
    "C6 apps backend-driven. server owns state + markup.",
    "C7 SSE = push updates, server-rendered fragments.",
    "C8 DX simple + pleasant. ergonomic Rust API.",
    "C9 components styled out-of-box, self-contained CSS shipped by lib.",
    "C10 ship showcase: component gallery + runnable interactive examples.",
    "C11 NO utility-CSS frameworks (tailwind etc) — they need extra build tools. own curated CSS instead.",
    "C12 built-in light + dark themes.",
    "C13 easy customize: lead colors, opacity/transparency, radius etc via CSS vars, no recompile.",
    "C14 curated helper/utility classes. essential set, NOT tailwind-billion.",
]
interfaces = [
    "I.comp   Rust component API. typed builders → html.",
    "I.axum   axum integration. response helpers, extractors, fragment-vs-full detect.",
    "I.jinja  minijinja registration. component fns/filters/templates.",
    "I.htmx   htmx attribute helpers (hx-get/post/swap/target/trigger).",
    "I.alpine alpine-style sprinkle helpers in templates.",
    "I.sse    SSE endpoint helper + event→fragment render.",
    "I.css    self-contained CSS: tokens + light/dark themes + curated utilities, served by lib, no bundler.",
    "I.theme  theme API: switch light/dark, override CSS vars (color/opacity/radius) for customization.",
    "I.show   showcase/playground binary. gallery + live examples.",
    "I.layout layout primitives: grid / stack / cluster → composable Markup.",
]

[[invariant]]
id = "V1"
text = "fragment-vs-full: HX-Request header present → render fragment only. absent → full page. server sends only needed/changed markup."

[[invariant]]
id = "V2"
text = "zero-build: lib usable + components render with zero node/npm/bundler step."

[[invariant]]
id = "V3"
text = "scoped styles: component emits valid html + scoped CSS. no class-name collision across components."

[[invariant]]
id = "V4"
text = "sse-fragments: SSE event renders minijinja fragment, pushed to client, swapped via htmx-sse."

[[invariant]]
id = "V5"
text = "a11y: interactive components keyboard-navigable + correct aria (radix-like)."

[[invariant]]
id = "V6"
text = "compose: components compose into axum responses w/o manual string concat."

[[invariant]]
id = "V7"
text = "sprinkle: common interactivity via declarative attrs. no hand-written JS for common cases."

[[invariant]]
id = "V8"
text = "showcase-live: showcase runs standalone, examples interactive not static."

[[invariant]]
id = "V9"
text = "themes: light + dark both built-in, switch at runtime w/o rebuild."

[[invariant]]
id = "V10"
text = "customize: lead colors, opacity, radius etc set via CSS custom props. no recompile, no extra tool."

[[invariant]]
id = "V11"
text = "utilities-curated: helper classes = essential curated set. covers common needs, NOT exhaustive tailwind-scale."

[[invariant]]
id = "V12"
text = "no-extra-tooling: styling requires zero downloaded CSS tool (no tailwind/postcss/sass CLI)."

[[invariant]]
id = "V13"
text = "overlay-no-clip: popover/menu/overlay markup must NOT be clipped by ancestor overflow. containers holding them stay overflow-visible."

[[invariant]]
id = "V14"
text = "showcase-code: every showcase example displays its usage code next to the live demo."

[[invariant]]
id = "V15"
text = "input-variants: Input supports label placement (top/floating/hidden) + hint/error text + size, all a11y-correct."

