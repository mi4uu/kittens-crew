[[bug]]
id = "B7"
date = "2026-05-26"
cause = "`@` autocomplete didn't fire — CM6 only auto-triggers on word chars; validFor excluded `@` so popup closed instantly"
fix = "update listener inspects last typed char; force `startCompletion`. `validFor` regex includes `@`. §V23"

[[bug]]
id = "B8"
date = "2026-05-26"
cause = "click inside transcluded embed body jumped parent editor cursor to a wrong line (embed body's data-source-line ≠ parent line)"
fix = "click handler aborts if ancestor is `.embed-body`. §V25"

[[bug]]
id = "B9"
date = "2026-05-26"
cause = 'deeply-nested folder rows (Journal/aaa/seepdir/deep01.md) truncated labels to "deep…" — always-visible 3-dot + pencil + trash + new-note inline buttons consumed row width. VSCode shows the same vault clean.'
fix = "hide `.tree-actions` until `:hover` / `:focus-within`; remove inline pencil/trash/new-note (already in 3-dot DropdownMenu since T75) so only the 3-dot button surfaces on hover. §V41"

[[bug]]
id = "B10"
date = "2026-05-27"
cause = 'new-note prompt accepted `\` (or `/`) in basename; client/server passed it through; `normalizeRel` rewrote `\`→`/` so the path became traversal-like (e.g. `ddd\.md` → `ddd/.md`); meanwhile a separate encoding step had landed `%5C` literal on disk as `ddd%5C.md`. Every Open/Rename/Delete failed because the rewritten path no longer matched the on-disk filename. Additionally Elysia did NOT URL-decode the `*` wildcard param, so even after the first patch the server saw `ddd%255C.md` literal instead of `ddd%5C.md` — 404.'
fix = 'drop the `\→/` substitution in `normalizeRel`. Add `assertSafeBasename` (server) + `validateBasename` (client) per V42. Add `decodeWildcard()` helper called in every route reading a path-shaped `*` param (notes, folders, backlinks, media, media-raw) so client-encoded `%25` round-trips back to `%`. §V42'

[[bug]]
id = "B11"
date = "2026-05-28"
cause = "`/api/settings` PATCH body schema listed only bookmarks/dailyDir/git, so Elysia's validator silently stripped the `rag` field from the payload. Endpoint returned 200 + correct shape, but `settings.patch()` never saw rag.enabled — the UI Switch flipped client-side then snapped back on the next GET. Identical breakage for provider/local/openaiCompat."
fix = "Add `rag` to the body schema (optional, full shape). Regression test PATCH→GET for both `rag.enabled` and nested `openaiCompat`. New invariant §V57 forbids future schema-drift between SettingsPatch and the route validator."

[[bug]]
id = "B12"
date = "2026-05-28"
cause = """Toggling Enable RAG ON in Settings showed "Indexed 0 notes (17 skipped) in 10ms" and nothing worked. The RagStore is only opened at startup if `loaded.rag.enabled === true`; flipping the flag at runtime left the store closed, so `indexNote()` threw "RagStore not opened" for every note — caught by reindexAll's try/catch and silently counted as "skipped"."""
fix = "`RagStore.ensureOpen()` + `RagPipeline.ensureRunning()` (both idempotent). reindexAll/indexNote/deleteNote demand-open the store. Settings PATCH calls `ragPipeline.ensureRunning()` when rag.enabled flips false→true and `applyConfig()` on every change. reindexAll now logs per-note skip reasons (≥5). §V58"

[[bug]]
id = "B13"
date = "2026-05-28"
cause = """Outline sidebar rendered every heading on top of the others — overlapping unreadable rows. The Outline component used `className="h-${level}"` for level-1..6, which clashes with Tailwind's height utilities (`h-1` = 4px … `h-6` = 24px), crushing every row to ≤24px. The `.outline .h-N` CSS only set `padding-left`, never overrode `height`."""
fix = "Rename to `lvl-1`..`lvl-6` in both `Outline.tsx` and `panels.css`. Lesson: do NOT pick class names that match Tailwind utility shapes (`h-N`, `w-N`, `m-N`, `p-N`, `text-N`, `bg-N`, etc)."

[[bug]]
id = "B14"
date = "2026-05-28"
cause = "Prebuilt brainmd binary on Linux threw `libonnxruntime.so.1.14.0: cannot open shared object file` for every note on first reindex with the default Local (Xenova) provider. Reason: `@xenova/transformers` depends on `onnxruntime-node`, which loads a platform-specific .so/.dll/.dylib at runtime; `bun --compile` doesn't bundle those native artefacts."
fix = '`LocalEmbedder.ready()` now catches the ONNX load error and rethrows with an actionable hint ("switch the RAG provider to OpenAI-compatible and point it at Ollama"). README documents the workaround. Long-term fix is shipping the prebuilt ONNX binding next to each release binary OR defaulting prebuilt binaries to openai-compat; tracked for v0.3.'
