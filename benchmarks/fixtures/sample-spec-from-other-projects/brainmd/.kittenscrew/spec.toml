schema = 1
goal = "web Obsidian clone. edit `.md` vault from browser & phone. core-plugin parity, no graph."
constraints = [
    "runtime: Bun",
    "backend: Elysia",
    "storage: filesystem. vault = dir tree of `.md` + `.media/`",
    "media path: `<note-dir>/.media/<file>` (same folder as note)",
    "no graph view",
    "no Obsidian plugin runtime. only what default Obsidian ships w/o community plugins",
    "UI ! responsive ≥ 320px (mobile) & desktop",
    "theme: light & dark. follow `prefers-color-scheme` + manual toggle. theme pref = device-local (localStorage)",
    "Markdown dialect = Obsidian flavor (CommonMark + GFM + wikilinks + embeds + callouts + math + mermaid + footnotes + tasks + frontmatter + tags + `==hl==` + `%%comments%%`)",
    "no external DB. index = in-mem + on-disk cache (`.brain/index.json`)",
    "single-user vault per server instance (auth ⊥ in v1)",
    "frontend stack: React 18 + CodeMirror 6 + unified/remark/rehype + highlight.js + KaTeX + mermaid (lazy)",
    "syntax highlighting: highlight.js, theme via CSS variables",
    "vault-local config = `<VAULT>/.brain/*.json` (settings, index, folder-meta, trash). env = bootstrap default only",
    "UI primitives: Radix UI (`@radix-ui/react-*`) — menus, dialogs, tooltips, popovers, tabs, toolbar, switch, toast, scroll-area",
    "UI vibe = desktop app (compact rows, hairline borders, subtle elevation). ref pattern: terax-ai `src/components/ui/context-menu.tsx` (Radix + Tailwind, dark-first)",
    "default vault + settings paths follow XDG Base Directory Spec on ALL platforms (macOS, Linux, Windows): vault = `${XDG_DATA_HOME:-$HOME/.local/share}/brain.md/vault`, settings = `${XDG_CONFIG_HOME:-$HOME/.config}/brain.md/`. ⊥ implicit `./vault` fallback.",
    "AI surface: MCP server (HTTP+SSE on `/mcp/*` of same Elysia app) + RAG via LanceDB (local, embedded, per-vault). zero external API key required for default install.",
    "embedding (default): bge-small-en-v1.5 via @xenova/transformers (ONNX, local, dim=384, ~133MB cache on first use).",
    "embedding (alternative): any OpenAI-compatible `/v1/embeddings` endpoint (Ollama, LM Studio, OpenAI, etc.). configurable in Settings.",
    "vector store: LanceDB (`@lancedb/lancedb`) at `<VAULT>/.brain/lance/`.",
    "chunking: paragraph-based, ≤512-token chunks w/ ~64-token overlap; per-note metadata (path, heading-trail, line range); frontmatter excluded.",
    "auth: OPTIONAL. default = no auth (auth.json absent → all endpoints open). user sets password via Settings → `<VAULT>/.brain/auth.json` written (argon2id) → bearer token required for HTTP API + MCP. removable via Settings.",
    "per-folder MCP permissions: each folder may set explicit `{read,write}` in `<VAULT>/.brain/folder-meta.json` under `mcp.<folder-path>`. default = `{read:true, write:true}`; explicit override wins; resolution walks note's parent folder ancestors to root; nearest override applies. applies to MCP tools only, ! HTTP API.",
]
interfaces = [
    "`/` → app shell. grid: topbar / sidebar / main(2-col panes share toolbar row)",
    'sidebar = collapsable sections (Radix Accordion, type="multiple"): Bookmarks | Vault tree | Tags | Outline | Backlinks | Related. each section has chevron-toggle header; state per-section persisted in localStorage. header w/ search + new note + new folder above the accordion. Related visible only when path && rag.enabled.',
    "toolbar = single row above both panes (editor + preview). format actions emit CM6 tx.",
    "mobile: drawer file tree, swipe to open, edit/preview tab switch",
    "all interactive controls (menu, dropdown, context-menu, dialog, popover, tooltip, tabs, toolbar, select, switch, toast, scroll-area) ! Radix-based. local wrappers in `web/src/components/ui/<primitive>.tsx`",
    "Settings dialog tabs: Appearance | Vault | Git | AI / RAG | Security | Editor",
    "`GET  /api/tree` → `{folders:[…], notes:[…]}` full vault tree",
    "`GET  /api/note/*path` → `{path, content, mtime}` raw md",
    "`PUT  /api/note/*path` body `{content}` → `{path, mtime}` upsert",
    "`DELETE /api/note/*path` → `{ok, trashed}`",
    "`POST /api/folder/*path` → `{ok}` mkdir",
    "`DELETE /api/folder/*path` → `{ok, trashed}`",
    "`POST /api/rename` body `{from, to}` → `{ok, patchedFiles, totalReplacements}` (rename + update inbound wikilinks; flat route — Elysia wildcard can't suffix-match `/rename`)",
    "`POST /api/media/*notePath` multipart `file` → `{url, path, name}`",
    "`GET  /api/media-raw/*path` → binary stream",
    "`GET  /api/search?q=…` → `[{path, title, score, snippet, matches}]` top 50",
    "`GET  /api/backlinks/*path` → `[{from, lineNo, context, embed}]`",
    '`GET  /api/resolve?name=…` → `{path, matches, source: "path"|"basename"|"alias"|null, ambiguous}` — hierarchy: full path → basename → alias',
    "`GET  /api/aliases` → `Record<aliasLowercase, paths[]>` (frontmatter aliases)",
    "`GET  /api/tags` → `[{tag, count}]`",
    "`GET  /api/tags/notes?tag=X` → `paths[]` (notes containing tag — index.byTag, ! path-substring)",
    "`GET  /api/tasks` → `[{path, lineNo, done, text}]` aggregate tasks vault-wide",
    "`GET  /api/trash` → `[{path, mtime, isDir}]`",
    "`POST /api/trash/restore` body `{trashPath}` → `{ok, path}`",
    "`GET  /api/git/status` → `{enabled, head, branch, dirty, lastCommit, autocommit:{enabled, debounceMs}}`",
    "`GET  /api/git/log?path=…&limit=N` → `[{sha, subject, ts, author}]` (vault-wide if no path)",
    "`GET  /api/git/show?sha=…&path=…` → `{content}`",
    "`GET  /api/git/diff?sha=…&path=…` → `{patch}` unified diff vs HEAD",
    "`POST /api/git/commit` body `{message?}` → `{sha|null}`",
    '`POST /api/git/restore` body `{path, sha}` → `{ok, sha}` (auto-commits "restore X → sha")',
    '`POST /api/git/checkpoint` body `{message?}` → `{sha, tag:"cp-<ts>"}`',
    "`POST /api/git/autocommit` body `{enabled?, debounceMs?}` → applies + persists to `.brain/settings.json`",
    "`POST /api/git/flush` → `{sha|null}` force-fire pending autocommit",
    "`GET  /api/settings` → `{version:1, bookmarks, dailyDir, git:{autocommit, debounceMs}, rag:{…}, editor:{mobileDefaultView}}`",
    '`PATCH /api/settings` body `{bookmarks?, dailyDir?, git?:{…}, rag?:{…}, editor?:{mobileDefaultView?: "edit"|"preview"}}` → full settings',
    "`GET  /api/folder-meta` → `{version:1, icons, colors}`",
    "`POST /api/folder-meta` body `{path, icon?, color?}` → `{ok, meta}`",
    "`brain` or `bun start` → serve `:3000`",
    "`brain --help` / `-h` → print usage + exit 0",
    "`brain --version` → print version + exit 0",
    "`brain --vault-dir <path>` / `-v <path>` → override vault location",
    "`brain --port <n>` / `-p <n>` → override HTTP port",
    "env (lower precedence than CLI flags):",
    "`VAULT_DIR` (default = XDG path above)",
    "`PORT` (default `3000`)",
    "`XDG_DATA_HOME` / `XDG_CONFIG_HOME` honored on all platforms",
    "`GIT_AUTOCOMMIT` = `1`/`0` (bootstrap default if no settings.json)",
    "`GIT_AUTOCOMMIT_DEBOUNCE_MS` (bootstrap default)",
    "precedence: CLI flag > env var > XDG default",
    "unknown CLI flag → stderr error + exit 2",
    "`brain --mcp-disabled` → skip mounting MCP routes (default = MCP enabled)",
    "default: no auth. all endpoints open unless `<VAULT>/.brain/auth.json` exists.",
    "`GET  /api/auth/status` → `{configured:bool, authenticated:bool}`",
    "`POST /api/auth/set` body `{newPassword, currentPassword?}` → `{ok}` (set initial OR change; currentPassword required if already configured)",
    "`POST /api/auth/clear` body `{currentPassword}` → `{ok}` (removes auth.json; endpoints open again)",
    "`POST /api/auth/login` body `{password}` → `{token, expiresAt}` (24h)",
    "`POST /api/auth/logout` body `{token}` → `{ok}`",
    "once auth.json exists: ∀ /api/* (minus /auth/status, /auth/login) + /mcp/* require `Authorization: Bearer <token>`",
    "POST `/mcp` JSON-RPC + GET `/mcp/sse` server→client streaming (MCP 2024-11-05 streamable HTTP)",
    "auth: same bearer token as HTTP API (only when auth.json exists)",
    "tools (17 total):",
    "core (10): search_notes, similar_notes, read_note, list_notes, get_backlinks, list_tags, get_tasks, current_datetime, write_note, append_note",
    "RAG/agent extensions (7): find_related, semantic_outline, context_for_query, find_similar_tasks, find_orphans, weekly_digest, compare_notes",
    "resources: `vault://tree`, `vault://note/<path>`",
    "instructions (V68): the `initialize` response carries server-level instructions surfaced to the model. Default is embedded (`DEFAULT_MCP_INSTRUCTIONS`) and owner-overridable per-vault at `<VAULT>/.brain/mcp-prompt.md` (seeded on first run; blank file = no instructions). Read per request, so edits apply without restart.",
    "∀ tool call enforces per-folder permissions (V52); read tools need `read:true`, write tools need `write:true` on the affected note's folder chain. RAG/agent extensions gated by V54 (ragEnabled + path-keyed perm filter).",
    "`GET  /api/folder-mcp-perms` → `Record<folderPath,{read,write}>`",
    "`POST /api/folder-mcp-perms` body `{path, read, write}` → upsert one folder",
    "`DELETE /api/folder-mcp-perms/*path` → drop override (falls back to inherited)",
    "`GET  /api/similar?q=<text>&k=<n>` → `[{path, score, snippet, lineRange, headingTrail}]` (top-k cosine)",
    "`POST /api/rag/reindex` → `{ok, indexed, skipped, durationMs}`",
    '`GET  /api/rag/status` → `{enabled, provider:"local"|"openai-compat", model, dim, chunks, lastIndexedAt, needsReindex}`',
    "`POST /api/rag/test` body `{provider, config}` → `{ok, dim, sampleEmbedding?}` (dry-run probe before saving openai-compat settings)",
    "`GET  /api/related/*path?k=<n>` → top-k chunks similar to the given note (used by sidebar Related section)",
    "`POST /api/context` body `{q, budget?}` → packed chunks under a token budget (default 2000) — `{text, sources:[{path, lineRange, score}]}`",
    "`GET  /api/orphans?limit=&iso=` → isolated notes (0 backlinks + low max-cosine to anything else)",
    "`GET  /api/digest?since=7d` → notes from period clustered into topics `[{topic_label, paths, representative}]`",
]

[[invariant]]
id = "V1"
text = "note path ! end `.md`. server rejects ≠."

[[invariant]]
id = "V2"
text = "vault writes ! confined to `VAULT_DIR`. ∀ path → resolve & check prefix. traversal ⊥."

[[invariant]]
id = "V3"
text = 'media uploaded for note `<dir>/note.md` → save `<dir>/.media/<file>`. mkdir `.media` if absent. filename ! contain `/` `\` or start `.`.'

[[invariant]]
id = "V4"
text = "wikilink resolve hierarchy: full path `[[Folder/Note]]` → basename `[[Note]]` (case-insensitive) → alias from frontmatter. dup basenames → ambiguous, first wins in render, full path inserted by drag-drop."

[[invariant]]
id = "V5"
text = "rename note → ∀ inbound `[[OldName]]` / `![[OldName]]` / aliased rewritten to `[[NewName]]` atomically (scan + patch all `.md`). section anchors preserved (`#Section`, `^block`)."

[[invariant]]
id = "V6"
text = "∀ API mutation ! atomic. write tmp → rename. partial writes ⊥."

[[invariant]]
id = "V7"
text = "markdown render = Obsidian flavor. ! parse: wikilinks, embeds, callouts, math, mermaid, footnotes, tasks, tags, tables, frontmatter, `==hl==`, `%%cm%%`, image dimensions `![[…|WxH]]`, heading anchors `[[Note#H]]`, raw HTML passthrough, syntax-highlighted code blocks via highlight.js (detect + ignore-missing)."

[[invariant]]
id = "V8"
text = "theme toggle persisted in `localStorage` (device-local). initial = system pref. ⊥ persist to vault."

[[invariant]]
id = "V9"
text = "editor saves on debounce 500ms & on blur. unsaved state visible. manual commit/checkpoint ! flush save first."

[[invariant]]
id = "V10"
text = "mobile layout ≥ 320px width, no horizontal scroll, touch targets ≥ 44px."

[[invariant]]
id = "V11"
text = "index rebuild on startup. incremental on write. `mtime`-based. entries hold `aliases` + merged `tags` (inline + frontmatter)."

[[invariant]]
id = "V12"
text = "media drag-drop into editor → upload → insert `![[file]]` at caret position (`posAtCoords`)."

[[invariant]]
id = "V13"
text = "file ops never lose data. delete → `.brain/trash/<ts>/<path>` (recoverable via `/api/trash/restore`)."

[[invariant]]
id = "V14"
text = "search = full-text over title + body + path + tags. case-insensitive. returns top 50."

[[invariant]]
id = "V15"
text = "frontmatter parsed YAML. malformed → show error, do not crash render."

[[invariant]]
id = "V16"
text = "vault dir = git repo (auto `git init` on startup if autocommit enabled & `.git` absent). `.brain/`, `node_modules`, `.DS_Store`, `*.tmp-*` git-ignored."

[[invariant]]
id = "V17"
text = "autocommit ! coalesce: debounce after last vault mutation. ≥1 staged change → commit. ⊥ commits else. flush() ! clearTimeout to prevent post-flush phantom fires."

[[invariant]]
id = "V18"
text = "git ops ! confined to `VAULT_DIR`. ∀ paths passed to git resolved & checked. shell args ! never interpolated — use argv array. GitRepo serialises writes through async mutex to prevent index lock races."

[[invariant]]
id = "V19"
text = "editor toolbar ∀ actions ! map to deterministic CM6 transactions. no DOM mutation. preserve undo."

[[invariant]]
id = "V20"
text = "toolbar tooltips ! show immediately on hover/focus (no browser delay). desktop layout wraps to multi-row when overflow; ⊥ horizontal scroll (mobile fallback = scroll)."

[[invariant]]
id = "V21"
text = "editor ↔ preview scroll sync. cursor line in editor → active block in preview (`.active-block`). anchor-aware: active block lands at same viewport Y as cursor when possible. SVG connector path drawn in pane gap, both endpoints visible. loop-safe (debounced, reciprocal-fire suppressed)."

[[invariant]]
id = "V22"
text = "note row in file tree ! draggable. drop on editor → insert `[[basename]]` if basename unique vault-wide, else `[[Folder/Subfolder/Name]]`. MIME `application/x-brain-note` + text fallback."

[[invariant]]
id = "V23"
text = "`@<query>` typed in editor → autocomplete w/ note basenames. accepting suggestion replaces `@<query>` w/ `[[<chosen>]]`. coexists w/ `[[` trigger. `startCompletion` force-fired since `@` is not a word char."

[[invariant]]
id = "V24"
text = "embed `![[Note]]` → fetch & inline target body in preview. default-collapsed (max-height ~3em + fade). chevron toggles. recursion guard via visited-set."

[[invariant]]
id = "V25"
text = "click inside `.embed-body` ⊥ move parent editor cursor. clicks on the embed header (outside body) still emit a line-jump for the embed location."

[[invariant]]
id = "V26"
text = "click on preview block w/ `[data-source-line]` (not link/tag/checkbox/embed-body) → editor cursor jumps to that source line. text selection (collapsed=false) suppresses jump."

[[invariant]]
id = "V27"
text = "image / video / audio `src` in standard markdown / raw HTML — if relative (not http/https/data:/abs/anchor) → rewritten to `<note-dir>/.media/<basename>` via `buildMediaUrl`."

[[invariant]]
id = "V28"
text = "rendered headings h1..h6 get slug `id` attr (dedup w/ `-N`). wikilink `[[Note#Heading]]` href = `#/note/<path>#<slug>`. hash listener parses trailing `#<slug>` and scrolls editor + preview to matching heading line."

[[invariant]]
id = "V29"
text = "frontmatter `aliases: [..]` ! resolve sources (in addition to basename). frontmatter `tags: [..]` (or `tag:`) ! merge w/ inline `#tag` into index.tags."

[[invariant]]
id = "V30"
text = "drag from tree → linkTarget = basename if unique vault-wide, else full vault-relative path (no `.md`). Editor drop uses `linkTarget`."

[[invariant]]
id = "V31"
text = "`==text==` (paired, single-line, no `=` inside) ! render `<mark>` in preview. `%%text%%` (inline or multi-line) ! stripped from preview. neither affects raw editor source."

[[invariant]]
id = "V32"
text = "settings persist to `<VAULT>/.brain/settings.json` (atomic write). env vars = bootstrap default only — on load, settings.json overrides env. `bookmarks`, `dailyDir`, `git.autocommit`, `git.debounceMs` persisted per-vault. theme = device-local localStorage."

[[invariant]]
id = "V33"
text = "tag filter view fed by `/api/tags/notes?tag=X` (index.byTag). ! filter by note path substring. tag click in preview navigates to `#/tag/<name>` which loads filtered list."

[[invariant]]
id = "V34"
text = "folder icons selectable from catalog (~30 SVG) or custom emoji `emoji:<char>`. rendered as **badge** over base folder icon (bottom-right corner). picker persists to `.brain/folder-meta.json`."

[[invariant]]
id = "V35"
text = "file tree row supports right-click context menu (note: Open/Rename/Delete; folder: New note / New folder / Set icon / Rename / Delete) + 3-dot button revealing same menu on hover."

[[invariant]]
id = "V36"
text = "active line indicator: editor `.cm-activeLine` + preview `.active-block` share styling (`--bg-hover` + 1px `--accent` bottom box-shadow). SVG path connects both endpoints when both visible."

[[invariant]]
id = "V37"
text = "outline panel = headings tree of current note. click → jump editor + preview to that heading's line."

[[invariant]]
id = "V38"
text = "∀ interactive overlay/menu/dialog/tooltip/popover/tabs/toolbar/select/toast ! built on Radix Primitives via `web/src/components/ui/*` wrappers. ⊥ ad-hoc DOM widgets, ⊥ raw `contextmenu`/`mousedown`-positioned popups, ⊥ hand-rolled focus traps. a11y (focus mgmt, ARIA, kbd nav, ESC, outside-click) delegated to Radix."

[[invariant]]
id = "V39"
text = "ui wrappers follow terax-ai pattern: `forwardRef` + `cn()` class merge + `data-[state=…]` variants + `data-[side=…]` slide-in. styled w/ Tailwind tokens, theme via CSS vars, dark+light parity verified per primitive."

[[invariant]]
id = "V40"
text = "tooltips instant (delayDuration=0 at provider), match V20. context menu = Radix ContextMenu, not 3rd-party. command palette = Radix Dialog + cmdk inside."

[[invariant]]
id = "V41"
text = "file tree row actions (3-dot menu + folder new-note button) ! visible only on `:hover` / `:focus-within` of the row. inline duplicates of dropdown-menu items ⊥ — ∀ destructive/structural actions live solely in the 3-dot DropdownMenu (T75). label gets full row width minus chevron + icon when row idle, so deep nesting (Journal/aaa/seepdir/deep01.md) stays readable. ref: VSCode + Obsidian tree behaviour."

[[invariant]]
id = "V42"
text = 'note + folder basenames ! contain `/`, `\`, `%`, NULL byte, CR, LF, or leading `.`. server rejects 400 INVALID_NAME at create/rename/folder-create/media-upload. client validates the same set in new-note/new-folder/rename prompts before submit (inline error, ! send). vault is POSIX-only: `normalizeRel` ⊥ rewrite `\` to `/` (legitimate `\` in basenames impossible under this rule; rewrite previously silently corrupted such files). Elysia ⊥ auto-decode the `*` wildcard param — ∀ route reading a path-shaped wildcard MUST call `decodeWildcard()` (single `decodeURIComponent`) before passing to vault, so existing pathological files (e.g. `ddd%5C.md`) round-trip correctly: client encodes `%` → `%25`, server decodes once → matches disk.'

[[invariant]]
id = "V43"
text = 'sidebar sections (Bookmarks, Vault, Tags, Outline, Backlinks) each collapsable independently via Radix Accordion (type="multiple"). open/closed state per-section persisted to localStorage key `brain.sidebar.<id>` (device-local, ⊥ vault). default on first load: Vault open; rest collapsed. Tags section sources from `/api/tags` (I.api), sorted by count desc; click tag → `#/tag/<name>` filter (V33).'

[[invariant]]
id = "V44"
text = "default vault location = `${XDG_DATA_HOME:-$HOME/.local/share}/brain.md/vault` on all platforms (macOS, Linux, Windows — same logic, no OS branch). default settings dir = `${XDG_CONFIG_HOME:-$HOME/.config}/brain.md/`. server resolves on startup: CLI > env > XDG default. `mkdir -p` resolved vault dir if missing (first run = empty vault, ! crash)."

[[invariant]]
id = "V45"
text = "server entry exposes `--help`/`-h`, `--vault-dir`/`-v <path>`, `--port`/`-p <n>`, `--version`. `--help` prints usage block + exits 0; unknown flag → stderr msg + exit 2."

[[invariant]]
id = "V46"
text = "MCP write tools (write_note, append_note) gated by per-folder permissions (V52) AND CLI flag `--mcp-disabled`. ∀ MCP tool call logged: name + args summary + result code (auditing)."

[[invariant]]
id = "V47"
text = "RAG chunks stored in LanceDB at `<VAULT>/.brain/lance/` table `notes_v1` cols: `id` (path#idx), `path`, `chunk_index`, `text`, `embedding` (float32[dim]), `heading_trail`, `line_start`, `line_end`, `mtime`, `model_id`, `provider_id`. incremental upsert on note write; row delete on note delete; rename = delete+reinsert."

[[invariant]]
id = "V48"
text = "chunking deterministic — split body on markdown paragraph boundaries (blank line), accumulate ≤512 tokens (approx via gpt-tokenizer cl100k), 64-token overlap between adjacent chunks. frontmatter excluded."

[[invariant]]
id = "V49"
text = "embedding provider abstraction: `local` = @xenova/transformers (default model = bge-small-en-v1.5, dim=384); `openai-compat` = POST `<baseURL>/embeddings` (or `<baseURL>/v1/embeddings` if baseURL lacks `/v1`) w/ `{input, model}` JSON body + optional `Authorization: Bearer <apiKey>`. config in `.brain/settings.json` under `rag.provider`, `rag.local.{model,dim}`, `rag.openaiCompat.{baseURL, model, apiKey, dim}`. switching provider OR model_id → store rows tagged w/ old `{provider_id, model_id}` → mismatch triggers `needsReindex=true` in `/api/rag/status`."

[[invariant]]
id = "V50"
text = 'MCP startup ! block on RAG readiness — `similar_notes` returns `{error:"index building", indexed:N, total:M}` while incomplete. full-text + read tools always available.'

[[invariant]]
id = "V51"
text = "RAG state surfaced in `/api/rag/status`; Settings UI tab: enable toggle + provider select (local|openai-compat) + conditional fields (baseURL, model, apiKey) + Test button (calls `/api/rag/test`) + manual Reindex button. ⊥ persist embeddings to git (`.brain/lance/` in `.gitignore`)."

[[invariant]]
id = "V52"
text = "per-folder MCP permissions = `{read:bool, write:bool}` per folder path in `<VAULT>/.brain/folder-meta.json` under `mcp.<path>`. resolution: walk note's parent folder ancestors to root; nearest explicit override wins; absent → default `{read:true, write:true}`. applies to MCP tool calls only, ! HTTP API (HTTP gates via V53)."

[[invariant]]
id = "V53"
text = "auth OPTIONAL. when `<VAULT>/.brain/auth.json` exists, ∀ /api/* (except `/auth/status` + `/auth/login`) + /mcp/* require `Authorization: Bearer <token>`. argon2id hash (memorycost 19MiB, timecost 2, parallelism 1). password set/changed via `/api/auth/set` (current required if already configured); cleared via `/api/auth/clear` (current required). tokens in-memory, 24h TTL, lost on restart. ⊥ env-based bootstrap — Settings UI is the sole entry point."

[[invariant]]
id = "V54"
text = """∀ RAG-derived MCP tool (similar_notes, find_related, semantic_outline, context_for_query, find_similar_tasks, find_orphans, weekly_digest, compare_notes) is read-only — never mutates vault. ∀ checks `ragEnabled()` first → `{error:"RAG disabled", code:"RAG_DISABLED"}` when off. ∀ path-keyed result row filtered through V52 folder-perm (read) before returning to caller; cross-folder aggregations (orphans, digest) suppress paths the client can't read."""

[[invariant]]
id = "V55"
text = 'tasks separately indexed in LanceDB table `tasks_v1` (cols: `id`=`<path>#L<lineNo>`, `path`, `line_no`, `text`, `done:bool`, `embedding` (float32[dim]), `model_id`, `provider_id`, `mtime`). Chunker emits one task-row per `^(\s*[-*+])\s+\[([ xX])\]\s+(.+)$` line of every note. Reindex required after enabling RAG so existing tasks land in the table. `find_similar_tasks` filters by `done` flag (open/done/all).'

[[invariant]]
id = "V56"
text = "Related sidebar section (web) queries `/api/related/*path?k=5` on note open (debounce 200ms). Shows path + heading-trail + snippet per hit. Click → openNote. Collapsible per V43, persisted under sidebar id `related`. Hidden when `!path || !rag.enabled`."

[[invariant]]
id = "V57"
text = "∀ field accepted by `settings.patch()` MUST appear in the `/api/settings` PATCH body schema. Elysia silently strips unknown keys → 200 + no-op. Whenever a top-level Settings field is added, mirror it in `settingsRoutes` body schema and add a round-trip regression test (PATCH → GET, value preserved)."

[[invariant]]
id = "V58"
text = 'RagPipeline opens on demand. `RagStore.ensureOpen()` is idempotent; `RagPipeline.ensureRunning()` opens store + subscribes to mutations. ∀ public mutation method (indexNote, deleteNote, reindexAll) calls ensureOpen() first. Settings PATCH flipping `rag.enabled` false→true MUST call `pipeline.ensureRunning()` so toggling RAG via UI works without a server restart. Reindex MUST surface per-note skip reasons via console (≥ first 5) — silent skips made the "Indexed 0 / N skipped" mode undiagnosable.'

[[invariant]]
id = "V59"
text = "RAG failure visibility. `RagPipeline.probe()` runs a 1-text embed and updates `pipeline.lastProbeError`. Settings PATCH on `rag.enabled` false→true MUST probe right away. `/api/rag/status.lastError` exposes the latest failure. UI MUST render a persistent banner in the RAG settings panel when `lastError !== null`, including a Google search link with a scrubbed (path/PII-free) version of the error so users can self-help. Bulk reindex failures also bump `lastProbeError` so the banner reflects them."

[[invariant]]
id = "V60"
text = 'editor settings live in `.brain/settings.json` under `editor.mobileDefaultView: "edit"|"preview"`. Default `"edit"`. Web `openNote()` initializes `mobileView` from this setting when `isMobile === true`. On desktop the setting is read but unused (no preview-only mode there).'

[[invariant]]
id = "V61"
text = 'Settings dialog has a dedicated "Editor" tab (Radix Tabs trigger value=`editor`). Editor tab hosts editor-side preferences; future editor settings (font size, autosave debounce, etc) extend this tab — they do not leak into AI / RAG or Appearance.'

[[invariant]]
id = "V62"
text = '`RagPipeline.applyConfig(cfg)` MUST rebuild the embedder unconditionally — comparing only providerId+modelId misses `baseURL`, `apiKey`, and `dim` changes (B17). The embedder constructor is cheap; warm-up cost is lazy in `.ready()` / first `.embed()`. Same class as V58 (RagStore.ensureOpen) and the implicit V15 "settings PATCH must reach runtime state". Whenever a SettingsStore field has a corresponding live object, the apply-path MUST rebuild aggressively, not diff-skip.'

[[invariant]]
id = "V63"
text = "OAuth 2.1 OPTIONAL alternative to V53 password auth. When enabled, the MCP authorization surface follows MCP spec 2025-11-25: PKCE S256 mandatory, audience-bound access tokens (RFC 8707 `resource` parameter), short-lived access tokens (24h) + rotated refresh tokens (7d). Scopes `vault:read`, `vault:write` map onto V52 folder permissions (folder-level perm intersects with scope; both must permit). V53 and V63 coexist: password tokens and OAuth tokens both flow through `TokenStore.validate()`; per-route choice is up to the client."

[[invariant]]
id = "V64"
text = 'OAuth discovery surface. MCP server MUST expose `GET /.well-known/oauth-protected-resource` (RFC 9728) returning `{resource, authorization_servers, scopes_supported}` and — when the embedded authorization server is on (same origin) — `GET /.well-known/oauth-authorization-server` (RFC 8414) returning issuer + `authorization_endpoint` + `token_endpoint` + `registration_endpoint` + `code_challenge_methods_supported: ["S256"]` + `client_id_metadata_document_supported: true`. Both endpoints MUST be reachable without auth (the whole point is to bootstrap auth). Resource and AS URLs MUST honour `x-forwarded-{proto,host}` so the advertised origin matches what the client sees through Cloudflare Tunnel or any reverse proxy.'

[[invariant]]
id = "V65"
text = '`WWW-Authenticate` challenge. Every 401 response from a protected path (V53 / V63) MUST include `WWW-Authenticate: Bearer resource_metadata="<origin>/.well-known/oauth-protected-resource", scope="vault:read vault:write"` per RFC 9728 §5.1. This lets MCP clients auto-discover the authorization server on a single unauthenticated round trip instead of probing well-known URIs.'

[[invariant]]
id = "V68"
text = 'server-level MCP instructions. The `initialize` response MUST carry an `instructions` string when one is active. The default (`server/src/mcp/instructions.ts` · `DEFAULT_MCP_INSTRUCTIONS`) is embedded in the binary and states: brain.md is the single source of truth (look up before answering, write durable knowledge back); never guess date/time — call `current_datetime`; file notes under `private/` vs `work/`. Owner override lives at `<VAULT>/.brain/mcp-prompt.md` — seeded with the default on first load, returned verbatim when non-empty, treated as "no instructions" when whitespace-only. Loaded per request so edits apply without a restart; FS errors fall back to the embedded default. Repo-root `mcp-prompt.md` mirrors the embedded default for humans.'

